version: '3.8'

services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    restart: always
    env_file:
      - ./gateway/.env
    ports:
      - "5900:5900"
      - "4004:4004"
    healthcheck:
      # This tries to open a connection to port 4002. 
      # If it succeeds, the exit code is 0 (Healthy).
      test: ["CMD-SHELL", "bash -c 'exec 3<> /dev/tcp/127.0.0.1/4002'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  trading-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    environment:
      - TZ=America/New_York
    restart: on-failure
    depends_on:
      ib-gateway:
        condition: service_healthy # The magic line